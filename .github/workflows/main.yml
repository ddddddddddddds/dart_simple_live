name: Build Simple Live TV APK
on:
  workflow_dispatch:
env:
  # 提前解决Node.js 20弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tv:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置Flutter环境（项目指定版本）
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: stable
          cache: true

      - name: 配置Android SDK
        run: |
          sudo apt-get update -y
          sudo apt-get install -y android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: 安装TV端依赖
        run: |
          cd simple_live_tv_app
          flutter pub get --no-color

      - name: 编译TV版Release APK（arm64）
        run: |
          cd simple_live_tv_app
          flutter build apk --release --target-platform android-arm64 --no-shrink

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-tv-apk
          path: simple_live_tv_app/build/app/outputs/flutter-apk/app-release.apk
